name: Hello World Workflow

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  greet:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Say Hello
        run: echo "Hello from GitHub Actions! 👋 Your workflow ran successfully."

      - name: Show current date
        run: date
      
      - name: Print my name
        run: echo "Lussac P.Maia"

      - name: List files
        run: ls -la

